appId: io.github.forinda.fordb
productName: fordb
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - package.json
  - '!**/*.map'
asarUnpack:
  - '**/*.node'
  - '**/node_modules/@libsql/**'
  - '**/node_modules/cpu-features/**'
  - '**/node_modules/ssh2/**'
npmRebuild: false
publish:
  provider: github
  owner: forinda
  repo: fordb
  releaseType: draft
linux:
  category: Development
  icon: build/icon.png
  target:
    - AppImage
    - deb
    - rpm
appImage:
  artifactName: fordb-${version}-${arch}.AppImage
deb:
  artifactName: fordb_${version}_${arch}.deb
rpm:
  artifactName: fordb-${version}-${arch}.rpm
win:
  icon: build/icon.ico
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: fordb-${version}-setup.${ext}
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: universal
  # @libsql ships separate per-arch prebuilds (darwin-arm64/ + darwin-x64/), so
  # each arch bundle carries both — byte-identical — which @electron/universal
  # can't reconcile. Mark them as arch-specific so it keeps them as-is instead of
  # trying to lipo-merge. ssh2/cpu-features build per-arch and lipo fine.
  x64ArchFiles: '**/@libsql/**'
dmg:
  artifactName: fordb-${version}-${arch}.dmg
