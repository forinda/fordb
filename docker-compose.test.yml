services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fordb
      POSTGRES_PASSWORD: fordb
      POSTGRES_DB: fordb_test
    ports:
      - '54329:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fordb -d fordb_test']
      interval: 2s
      timeout: 2s
      retries: 15
  libsql:
    image: ghcr.io/tursodatabase/libsql-server:latest
    ports:
      - '8080:8080'
    environment:
      SQLD_NODE: primary
    healthcheck:
      # The image ships no wget/curl — only bash. A /dev/tcp probe confirms the
      # HTTP port is accepting connections (sqld serves immediately on listen).
      test: ['CMD', 'bash', '-c', 'echo > /dev/tcp/localhost/8080']
      interval: 2s
      timeout: 2s
      retries: 20
  mongo:
    image: mongo:7
    ports:
      - '27027:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping")']
      interval: 2s
      timeout: 2s
      retries: 20
