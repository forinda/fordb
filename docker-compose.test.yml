services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fordb
      POSTGRES_PASSWORD: fordb
      POSTGRES_DB: fordb_test
    ports:
      - '54329:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fordb -d fordb_test']
      interval: 2s
      timeout: 2s
      retries: 15
