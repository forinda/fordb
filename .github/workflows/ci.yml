name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # Bundles all three processes incl. native-dep externalization — catches
      # build breaks (e.g. ssh2/cpu-features) that typecheck alone misses.
      - run: pnpm build
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # Bring up ALL contract services (postgres + libsql + mongo) from the
      # same compose file the local `pnpm db:up` uses — the previous
      # postgres-only `services:` block left the SQLite-remote/replica and
      # MongoDB contract suites with no server, failing the job.
      - run: pnpm db:up
      - run: pnpm test:contract
      - if: always()
        run: pnpm db:down
