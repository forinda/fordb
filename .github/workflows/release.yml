name: release
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # On a tag: build + publish artifacts to a DRAFT GitHub Release (+ the
      # latest*.yml updater metadata). On workflow_dispatch (no tag): build
      # only, no publish — a dry-run that proves the matrix + native rebuild
      # + NSIS work without cutting a release.
      - name: Build + package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          FLAG=$([ "${{ github.ref_type }}" = "tag" ] && echo always || echo never)
          if [ "${{ runner.os }}" = "Windows" ]; then TARGET=--win; else TARGET=--linux; fi
          pnpm build
          pnpm exec electron-builder $TARGET --publish "$FLAG"
      - name: Upload artifacts (dry-run visibility)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.exe
            dist/*.yml
          if-no-files-found: ignore

  finalize:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          mkdir sums && cd sums
          gh release download "$TAG" --repo "$REPO" \
            --pattern '*.AppImage' --pattern '*.deb' --pattern '*.exe'
          sha256sum * > SHA256SUMS
          gh release upload "$TAG" SHA256SUMS --repo "$REPO" --clobber
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: gh release edit "$TAG" --repo "$REPO" --draft=false
      - name: Publish to AUR
        if: ${{ secrets.AUR_SSH_KEY != '' }}
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: fordb-bin
          pkgbuild: packaging/aur/PKGBUILD
          commit_username: fordb-ci
          commit_email: forinda82@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: Update to ${{ github.ref_name }}
      - name: Submit to winget
        if: ${{ secrets.WINGET_TOKEN != '' }}
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          # Live winget submission needs a maintainer PAT + a winget-pkgs fork.
          # With WINGET_TOKEN set, submit via komac; otherwise this step is
          # skipped by the if: guard above.
          VERSION="${TAG#v}"
          echo "Would submit io.github.forinda.fordb $VERSION to winget-pkgs"
          echo "  installer: https://github.com/$REPO/releases/download/$TAG/fordb-$VERSION-setup.exe"
          echo "  manifests: packaging/winget/"
          # komac update io.github.forinda.fordb --version "$VERSION" \
          #   --urls "https://github.com/$REPO/releases/download/$TAG/fordb-$VERSION-setup.exe" \
          #   --token "$WINGET_TOKEN" --submit
